<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Quản lý BHXH</title>
<style>
body { font-family: Arial; margin: 20px; }
input, button { padding: 5px; margin: 5px; }
table { border-collapse: collapse; width: 100%; margin-top: 20px; }
th, td { border: 1px solid #ccc; padding: 8px; text-align: left; }
</style>
</head>
<body>

<h2>Tra cứu Nhân Viên</h2>

<input type="text" id="search" placeholder="Nhập tên nhân viên...">
<button onclick="searchNV()">Tìm kiếm</button>

<table id="table">
<thead>
<tr>
<th>Mã NV</th>
<th>Tên</th>
<th>Chức vụ</th>
<th>Doanh nghiệp</th>
<th>Lương</th>
</tr>
</thead>
<tbody></tbody>
</table>

<script>
// ================= DATABASE (GIẢ LẬP) =================
const ChucVu = [
 {MaCV:"CV01", TenCV:"Giám đốc", Luong:50000000},
 {MaCV:"CV02", TenCV:"Phó GĐ", Luong:35000000},
 {MaCV:"CV03", TenCV:"Quản lý", Luong:20000000},
 {MaCV:"CV04", TenCV:"Kế toán", Luong:15000000},
 {MaCV:"CV05", TenCV:"Nhân viên", Luong:10000000}
];

const DoanhNghiep = [
 {MaDN:"DN01", TenDN:"Công ty Công nghệ Việt"},
 {MaDN:"DN02", TenDN:"Tập đoàn Xây dựng Nam"},
 {MaDN:"DN03", TenDN:"Cửa hàng Bán lẻ Minh"}
];

const NhanVien = [
 {MaNV:"NV01", Ten:"Nguyễn Văn An", MaCV:"CV01", MaDN:"DN01"},
 {MaNV:"NV02", Ten:"Lê Thị Bình", MaCV:"CV04", MaDN:"DN01"},
 {MaNV:"NV03", Ten:"Trần Văn Cường", MaCV:"CV05", MaDN:"DN01"},
 {MaNV:"NV04", Ten:"Phạm Minh Đức", MaCV:"CV02", MaDN:"DN02"},
 {MaNV:"NV05", Ten:"Hoàng Thu Thủy", MaCV:"CV04", MaDN:"DN02"}
];

// ================= QUERY (THAY SQL) =================

// join dữ liệu
function getFullData() {
 return NhanVien.map(nv => {
   const cv = ChucVu.find(c => c.MaCV === nv.MaCV);
   const dn = DoanhNghiep.find(d => d.MaDN === nv.MaDN);

   return {
     MaNV: nv.MaNV,
     Ten: nv.Ten,
     ChucVu: cv.TenCV,
     DoanhNghiep: dn.TenDN,
     Luong: cv.Luong
   };
 });
}

// ================= HIỂN THỊ =================
function render(data){
 const tbody = document.querySelector("#table tbody");
 tbody.innerHTML = "";

 data.forEach(d => {
   tbody.innerHTML += `
   <tr>
     <td>${d.MaNV}</td>
     <td>${d.Ten}</td>
     <td>${d.ChucVu}</td>
     <td>${d.DoanhNghiep}</td>
     <td>${d.Luong}</td>
   </tr>`;
 });
}

// ================= SEARCH =================
function searchNV(){
 const key = document.getElementById("search").value.toLowerCase();
 const data = getFullData();

 const result = data.filter(nv => 
   nv.Ten.toLowerCase().includes(key)
 );

 render(result);
}

// load ban đầu
render(getFullData());

</script>

</body>
</html>
