<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>QL BHXH FULL</title>
<style>
body { font-family: Arial; margin:20px;}
input, button { padding:6px; margin:4px;}
table { border-collapse: collapse; width:100%; margin-top:20px;}
th,td { border:1px solid #ccc; padding:6px;}
</style>
</head>
<body>

<h2>QUẢN LÝ BHXH (FULL)</h2>

<!-- NHÂN VIÊN -->
<h3>Nhân viên</h3>
<input id="maNV" placeholder="Mã NV">
<input id="tenNV" placeholder="Tên NV">
<input id="ngaySinh" type="date">
<input id="gioiTinh" placeholder="Giới tính">
<input id="cccd" placeholder="CCCD">
<input id="diaChi" placeholder="Địa chỉ">
<input id="sdt" placeholder="SĐT">
<input id="maCV" placeholder="Mã CV">
<input id="maDN" placeholder="Mã DN">
<button onclick="addNV()">Thêm NV</button>

<!-- HỢP ĐỒNG -->
<h3>Hợp đồng</h3>
<input id="maHD" placeholder="Mã HD">
<input id="hdNV" placeholder="Mã NV">
<input id="ngayBD" type="date">
<input id="ngayKT" type="date">
<button onclick="addHD()">Thêm HD</button>

<!-- SỔ BHXH -->
<h3>Sổ BHXH</h3>
<input id="maSo" placeholder="Mã sổ">
<input id="soNV" placeholder="Mã NV">
<input id="noiCap" placeholder="Nơi cấp">
<button onclick="addSo()">Thêm sổ</button>

<!-- CHẾ ĐỘ -->
<h3>Chế độ</h3>
<input id="maCD" placeholder="Mã CD">
<input id="tenCD" placeholder="Tên CD">
<input id="tienCD" placeholder="Tiền">
<button onclick="addCD()">Thêm CD</button>

<!-- HƯỞNG -->
<h3>Hưởng chế độ</h3>
<input id="huongNV" placeholder="Mã NV">
<input id="huongCD" placeholder="Mã CD">
<input id="tienHuong" placeholder="Tiền hưởng">
<button onclick="addHuong()">Thêm hưởng</button>

<!-- SEARCH -->
<h3>Tìm kiếm</h3>
<input id="search" placeholder="NV / DN / CD">
<button onclick="search()">Tìm</button>

<!-- TABLE -->
<table>
<thead>
<tr>
<th>NV</th><th>Tên</th><th>DN</th>
<th>HD</th><th>Sổ</th>
<th>Chế độ</th><th>Tiền hưởng</th>
</tr>
</thead>
<tbody id="table"></tbody>
</table>

<script>

// ===== DATABASE =====
let NhanVien = [];
let HopDong = [];
let SoBHXH = [];
let CheDo = [];
let Huong = [];

// ===== ADD NV =====
function addNV(){
 if(!maNV.value || !tenNV.value) return alert("Thiếu dữ liệu");

 NhanVien.push({
  MaNV: maNV.value,
  Ten: tenNV.value,
  MaDN: maDN.value
 });

 render();
}

// ===== ADD HD =====
function addHD(){
 if(!NhanVien.find(n=>n.MaNV==hdNV.value))
  return alert("NV chưa tồn tại");

 HopDong.push({
  MaHD: maHD.value,
  MaNV: hdNV.value
 });

 render();
}

// ===== ADD SỔ =====
function addSo(){
 if(!NhanVien.find(n=>n.MaNV==soNV.value))
  return alert("NV chưa tồn tại");

 SoBHXH.push({
  MaSo: maSo.value,
  MaNV: soNV.value
 });

 render();
}

// ===== ADD CD =====
function addCD(){
 CheDo.push({
  Ma: maCD.value,
  Ten: tenCD.value,
  Tien: Number(tienCD.value)
 });
 alert("Thêm CD OK");
}

// ===== ADD HƯỞNG =====
function addHuong(){
 let nv = NhanVien.find(n=>n.MaNV==huongNV.value);
 if(!nv) return alert("Chưa có NV");

 let cd = CheDo.find(c=>c.Ma==huongCD.value);
 if(!cd) return alert("Sai mã CD");

 Huong.push({
  MaNV: huongNV.value,
  MaCD: huongCD.value,
  Tien: tienHuong.value || cd.Tien
 });

 render();
}

// ===== JOIN =====
function getData(){
 return NhanVien.map(nv=>{
  let hd = HopDong.find(h=>h.MaNV==nv.MaNV);
  let so = SoBHXH.find(s=>s.MaNV==nv.MaNV);
  let h = Huong.find(x=>x.MaNV==nv.MaNV);
  let cd = CheDo.find(c=>c.Ma==h?.MaCD);

  return {
   ...nv,
   HD: hd?.MaHD || "",
   So: so?.MaSo || "",
   CD: cd?.Ten || "",
   Tien: h?.Tien || ""
  };
 });
}

// ===== RENDER =====
function render(){
 table.innerHTML = getData().map(d=>`
<tr>
<td>${d.MaNV}</td>
<td>${d.Ten}</td>
<td>${d.MaDN}</td>
<td>${d.HD}</td>
<td>${d.So}</td>
<td>${d.CD}</td>
<td>${d.Tien}</td>
</tr>
`).join("");
}

// ===== SEARCH =====
function search(){
 let key = search.value;
 let data = getData().filter(d =>
  d.MaNV.includes(key) ||
  d.MaDN.includes(key) ||
  d.CD.includes(key)
 );

 table.innerHTML = data.map(d=>`
<tr>
<td>${d.MaNV}</td>
<td>${d.Ten}</td>
<td>${d.MaDN}</td>
<td>${d.HD}</td>
<td>${d.So}</td>
<td>${d.CD}</td>
<td>${d.Tien}</td>
</tr>
`).join("");
}

</script>

</body>
</html>
