<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>BHXH System</title>
<style>
body{margin:0;font-family:Arial;display:flex;}
.sidebar{width:220px;background:#2c3e50;color:white;height:100vh;padding:20px;}
.sidebar h2{color:#1abc9c;}
.sidebar button{
 width:100%;margin:8px 0;padding:10px;border:none;
 background:#34495e;color:white;cursor:pointer;
}
.main{flex:1;padding:20px;}
.card{background:#ecf0f1;padding:20px;margin:10px;display:inline-block;border-radius:8px;}
input,button{padding:6px;margin:4px;}
table{border-collapse:collapse;width:100%;margin-top:20px;}
th,td{border:1px solid #ccc;padding:6px;}
</style>
</head>
<body>

<!-- SIDEBAR -->
<div class="sidebar">
<h2>BHXH</h2>
<button onclick="show('dashboard')">Dashboard</button>
<button onclick="show('nv')">Nhân viên</button>
<button onclick="show('cd')">Chế độ</button>
</div>

<div class="main">

<!-- DASHBOARD -->
<div id="dashboard">
<h2>Dashboard</h2>
<div class="card">Tổng NV: <span id="tongNV"></span></div>
<div class="card">Tổng BHXH: <span id="tongBHXH"></span></div>
<div class="card">Đã đóng: <span id="daDong"></span></div>
</div>

<!-- NHÂN VIÊN -->
<div id="nv" style="display:none">
<h2>Nhân viên</h2>

<input id="maNV" placeholder="Mã NV">
<input id="tenNV" placeholder="Tên NV">
<input id="maDN" placeholder="Mã DN">
<input id="maCV" placeholder="Mã CV">

<br>

<input id="luong" readonly placeholder="Lương">
<input id="thuong" readonly placeholder="Thưởng">
<input id="bhxhTien" readonly placeholder="BHXH">
<input id="trangThai" readonly placeholder="Trạng thái">

<br>

<button onclick="addNV()">Thêm</button>
<button onclick="updateNV()">Cập nhật</button>

<table>
<thead>
<tr>
<th>NV</th><th>Tên</th><th>CV</th>
<th>Lương</th><th>Thưởng</th>
<th>BHXH</th><th>Trạng thái</th>
<th>Action</th>
</tr>
</thead>
<tbody id="tableNV"></tbody>
</table>
</div>

<!-- CHẾ ĐỘ -->
<div id="cd" style="display:none">
<h2>Chế độ</h2>

<input id="nvCD" placeholder="Mã NV">
<input id="maCD" placeholder="Mã CD">
<input id="tenCD" readonly placeholder="Tên">
<input id="tienCD" readonly placeholder="Tiền">

<button onclick="addCD()">Thêm</button>

<table>
<thead>
<tr>
<th>NV</th><th>Chế độ</th><th>Tiền</th><th>Xóa</th>
</tr>
</thead>
<tbody id="tableCD"></tbody>
</table>
</div>

</div>

<script>

// ===== DATA =====
let ChucVu = [
 {Ma:"CV01", Luong:50000000, Thuong:10000000, TrangThai:"Đã đóng"},
 {Ma:"CV02", Luong:35000000, Thuong:5000000, TrangThai:"Đã đóng"},
 {Ma:"CV03", Luong:20000000, Thuong:2000000, TrangThai:"Chưa đóng"}
];

let CheDo = [
 {Ma:"CD01", Ten:"Ốm đau", Tien:2000000},
 {Ma:"CD02", Ten:"Thai sản", Tien:90000000}
];

let NhanVien = [];
let Huong = [];

// ===== NAV =====
function show(id){
 document.querySelectorAll(".main > div").forEach(d=>d.style.display="none");
 document.getElementById(id).style.display="block";
}

// ===== AUTO CV =====
maCV.oninput = function(){
 let cv = ChucVu.find(c=>c.Ma===maCV.value.trim().toUpperCase());

 if(!cv){
  luong.value=""; thuong.value="";
  bhxhTien.value=""; trangThai.value="Sai CV";
  return;
 }

 luong.value = cv.Luong;
 thuong.value = cv.Thuong;

 let tong = cv.Luong + cv.Thuong;
 bhxhTien.value = Math.min(tong*0.32,46800000);

 trangThai.value = cv.TrangThai;
}

// ===== AUTO CD =====
maCD.oninput = function(){
 let cd = CheDo.find(c=>c.Ma===maCD.value.trim().toUpperCase());

 if(!cd){
  tenCD.value="Sai CD"; tienCD.value="";
  return;
 }

 tenCD.value = cd.Ten;
 tienCD.value = cd.Tien;
}

// ===== RESET =====
function resetForm(){
 maNV.value="";
 tenNV.value="";
 maDN.value="";
 maCV.value="";
 luong.value="";
 thuong.value="";
 bhxhTien.value="";
 trangThai.value="";
 nvCD.value="";
 maCD.value="";
 tenCD.value="";
 tienCD.value="";
}

// ===== ADD NV =====
function addNV(){
 let ma = maNV.value.trim();
 let ten = tenNV.value.trim();
 let maCv = maCV.value.trim().toUpperCase();

 if(!ma || !ten) return alert("Thiếu dữ liệu");

 if(NhanVien.some(n=>n.MaNV===ma))
  return alert("Trùng mã");

 let cv = ChucVu.find(c=>c.Ma===maCv);
 if(!cv) return alert("Sai CV");

 let tong = cv.Luong + cv.Thuong;
 let bhxh = Math.min(tong*0.32,46800000);

 NhanVien.push({
  MaNV:ma,
  Ten:ten,
  MaCV:maCv,
  Luong:cv.Luong,
  Thuong:cv.Thuong,
  BHXH:bhxh,
  TrangThai:cv.TrangThai
 });

 render();
 resetForm();
}

// ===== EDIT =====
function editNV(ma){
 let nv = NhanVien.find(n=>n.MaNV===ma);

 maNV.value = nv.MaNV;
 tenNV.value = nv.Ten;
 maCV.value = nv.MaCV;

 maCV.dispatchEvent(new Event("input"));
}

// ===== UPDATE =====
function updateNV(){
 let nv = NhanVien.find(n=>n.MaNV===maNV.value);
 if(!nv) return alert("Không tìm thấy");

 let cv = ChucVu.find(c=>c.Ma===maCV.value);
 if(!cv) return alert("Sai CV");

 let tong = cv.Luong + cv.Thuong;
 let bhxh = Math.min(tong*0.32,46800000);

 nv.Ten = tenNV.value;
 nv.MaCV = maCV.value;
 nv.Luong = cv.Luong;
 nv.Thuong = cv.Thuong;
 nv.BHXH = bhxh;
 nv.TrangThai = cv.TrangThai;

 render();
 resetForm();
}

// ===== DELETE NV =====
function delNV(ma){
 if(!confirm("Xóa?")) return;
 NhanVien = NhanVien.filter(n=>n.MaNV!==ma);
 Huong = Huong.filter(h=>h.NV!==ma);
 render();
}

// ===== ADD CD =====
function addCD(){
 let nv = NhanVien.find(n=>n.MaNV===nvCD.value);
 if(!nv) return alert("Chưa có NV");

 let cd = CheDo.find(c=>c.Ma===maCD.value);
 if(!cd) return alert("Sai CD");

 Huong.push({
  NV:nvCD.value,
  Ten:cd.Ten,
  Tien:cd.Tien
 });

 render();
 resetForm();
}

// ===== DELETE CD =====
function delCD(ma){
 Huong = Huong.filter(h=>h.NV!==ma);
 render();
}

// ===== RENDER =====
function render(){

 tableNV.innerHTML = NhanVien.map(n=>`
<tr>
<td>${n.MaNV}</td>
<td>${n.Ten}</td>
<td>${n.MaCV}</td>
<td>${n.Luong}</td>
<td>${n.Thuong}</td>
<td>${n.BHXH}</td>
<td>${n.TrangThai}</td>
<td>
<button onclick="editNV('${n.MaNV}')">Sửa</button>
<button onclick="delNV('${n.MaNV}')">Xóa</button>
</td>
</tr>`).join("");

 tableCD.innerHTML = Huong.map(h=>`
<tr>
<td>${h.NV}</td>
<td>${h.Ten}</td>
<td>${h.Tien}</td>
<td><button onclick="delCD('${h.NV}')">Xóa</button></td>
</tr>`).join("");

 tongNV.innerText = NhanVien.length;
 tongBHXH.innerText = NhanVien.reduce((s,n)=>s+Number(n.BHXH),0);
 daDong.innerText = NhanVien.filter(n=>n.TrangThai==="Đã đóng").length;
}

</script>

</body>
</html>
