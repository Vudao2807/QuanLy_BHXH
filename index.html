<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Hệ thống Quản lý BHXH</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; max-width: 800px; margin: 40px auto; padding: 20px; line-height: 1.6; }
        .search-box { display: flex; gap: 10px; margin-bottom: 30px; }
        input { flex: 1; padding: 10px; border: 1px solid #ddd; border-radius: 4px; }
        button { padding: 10px 20px; background: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #eee; padding: 12px; text-align: left; }
        th { background: #f8f9fa; }
        .status-done { color: green; font-weight: bold; }
        .status-wait { color: red; }
    </style>
</head>
<body>
    <h1>Tra cứu Bảo hiểm xã hội</h1>
    <div class="search-box">
        <input type="text" id="maNV" placeholder="Nhập mã nhân viên (VD: NV01, NV10)...">
        <button onclick="search()">Truy vấn</button>
    </div>

    <div id="info"></div>
    <table id="resultTable" style="display: none;">
        <thead>
            <tr>
                <th>Tháng/Năm</th>
                <th>Số tiền đóng</th>
                <th>Trạng thái</th>
            </tr>
        </thead>
        <tbody id="resultBody"></tbody>
    </table>

    <script>
        async function search() {
            const ma = document.getElementById('maNV').value;
            const res = await fetch(`/api/search/${ma}`);
            const data = await res.json();

            if (!res.ok) {
                alert(data.message);
                return;
            }

            document.getElementById('info').innerHTML = `<h3>Nhân viên: ${data.nhanVien.TenNV} - ${data.nhanVien.ChucVu}</h3>`;
            const tbody = document.getElementById('resultBody');
            tbody.innerHTML = '';
            
            data.lichSu.forEach(item => {
                tbody.innerHTML += `
                    <tr>
                        <td>${item.Thang}/${item.Nam}</td>
                        <td>${item.SoTien.toLocaleString()} VNĐ</td>
                        <td class="${item.TrangThai === 'Đã đóng' ? 'status-done' : 'status-wait'}">${item.TrangThai}</td>
                    </tr>`;
            });
            document.getElementById('resultTable').style.display = 'table';
        }
    </script>
</body>
</html>
