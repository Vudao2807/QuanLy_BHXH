<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Quản lý BHXH</title>
<style>
body { font-family: Arial; margin: 20px; }
input, select, button { padding: 6px; margin: 5px; }
table { border-collapse: collapse; width: 100%; margin-top: 20px; }
th, td { border: 1px solid #ccc; padding: 8px; }
.error { border: 2px solid red; }
</style>
</head>
<body>

<h2>QUẢN LÝ NHÂN VIÊN BHXH</h2>

<!-- FORM NHÂN VIÊN -->
<input id="maNV" placeholder="Mã NV">
<input id="tenNV" placeholder="Tên NV">
<input id="thuong" type="number" placeholder="Thưởng">

<select id="maCV"></select>
<select id="maDN"></select>
<select id="maCD"></select>

<button onclick="addNV()">Thêm</button>
<button onclick="updateNV()">Sửa</button>

<br>

<!-- FORM CHẾ ĐỘ -->
<h3>Thêm chế độ</h3>
<input id="newMaCD" placeholder="Mã chế độ">
<input id="newTenCD" placeholder="Tên chế độ">
<button onclick="addCheDo()">Thêm chế độ</button>

<br><br>

<!-- SEARCH -->
<input id="searchNV" placeholder="Tìm theo Mã NV">
<input id="searchDN" placeholder="Tìm theo Mã DN">
<input id="searchCD" placeholder="Tìm theo Mã CD">
<button onclick="search()">Tìm</button>

<!-- TABLE -->
<table>
<thead>
<tr>
<th>Mã NV</th>
<th>Tên</th>
<th>Mã CV</th>
<th>Lương cơ bản</th>
<th>Thưởng</th>
<th>Tổng lương</th>
<th>Mã DN</th>
<th>Mã CD</th>
<th>Chế độ</th>
<th>Tiền hưởng</th>
<th>Action</th>
</tr>
</thead>
<tbody id="table"></tbody>
</table>

<script>

// ===== DATABASE =====
let ChucVu = [
 {MaCV:"CV01", Ten:"Giám đốc", Luong:50000000},
 {MaCV:"CV02", Ten:"Phó GD", Luong:35000000},
 {MaCV:"CV03", Ten:"Quản lý", Luong:20000000},
 {MaCV:"CV04", Ten:"Kế toán", Luong:15000000},
 {MaCV:"CV05", Ten:"Nhân viên", Luong:10000000}
];

let DoanhNghiep = [
 {MaDN:"DN01"}, {MaDN:"DN02"}, {MaDN:"DN03"}
];

let CheDo = [
 {Ma:"CD01", Ten:"Ốm đau", Tien:2000000},
 {Ma:"CD02", Ten:"Thai sản", Tien:90000000}
];

let NhanVien = [
 {MaNV:"NV01", Ten:"An", MaCV:"CV01", MaDN:"DN01", Thuong:1000000, MaCD:"CD01"},
];

// ===== LOAD SELECT =====
function loadSelect(){
 maCV.innerHTML = ChucVu.map(c=>`<option value="${c.MaCV}">${c.MaCV}</option>`).join("");
 maDN.innerHTML = DoanhNghiep.map(d=>`<option>${d.MaDN}</option>`).join("");
 maCD.innerHTML = CheDo.map(c=>`<option value="${c.Ma}">${c.Ma}</option>`).join("");
}
loadSelect();

// ===== JOIN =====
function getData(){
 return NhanVien.map(nv=>{
  let cv = ChucVu.find(c=>c.MaCV==nv.MaCV);
  let cd = CheDo.find(c=>c.Ma==nv.MaCD);

  let tong = cv.Luong + Number(nv.Thuong || 0);

  return {
   ...nv,
   Luong: cv.Luong,
   Tong: tong,
   TenCD: cd?.Ten || "Không",
   TienCD: cd?.Tien || 0
  }
 });
}

// ===== RENDER =====
function render(data){
 table.innerHTML = data.map(nv=>`
<tr onclick="fill('${nv.MaNV}')">
<td>${nv.MaNV}</td>
<td>${nv.Ten}</td>
<td>${nv.MaCV}</td>
<td>${nv.Luong}</td>
<td>${nv.Thuong}</td>
<td>${nv.Tong}</td>
<td>${nv.MaDN}</td>
<td>${nv.MaCD || ""}</td>
<td>${nv.TenCD}</td>
<td>${nv.TienCD}</td>
<td>
<button onclick="event.stopPropagation(); del('${nv.MaNV}')">Xóa</button>
</td>
</tr>
`).join("");
}

// ===== VALIDATE =====
function validate(ma, ten){
 if(!ma || !ten){
  alert("❌ Không được để trống!");
  return false;
 }
 return true;
}

// ===== ADD NV =====
function addNV(){
 let ma = maNV.value.trim();
 let ten = tenNV.value.trim();

 if(!validate(ma, ten)) return;

 if(NhanVien.some(n=>n.MaNV==ma)){
  alert("❌ Trùng mã!");
  return;
 }

 NhanVien.push({
  MaNV: ma,
  Ten: ten,
  MaCV: maCV.value,
  MaDN: maDN.value,
  Thuong: thuong.value || 0,
  MaCD: maCD.value
 });

 render(getData());
}

// ===== UPDATE =====
function updateNV(){
 let nv = NhanVien.find(n=>n.MaNV==maNV.value);
 if(!nv) return alert("Không tìm thấy");

 nv.Ten = tenNV.value;
 nv.MaCV = maCV.value;
 nv.MaDN = maDN.value;
 nv.Thuong = thuong.value;
 nv.MaCD = maCD.value;

 render(getData());
}

// ===== DELETE =====
function del(ma){
 NhanVien = NhanVien.filter(n=>n.MaNV!=ma);
 render(getData());
}

// ===== SEARCH =====
function search(){
 let data = getData();

 if(searchNV.value)
  data = data.filter(n=>n.MaNV.includes(searchNV.value));

 if(searchDN.value)
  data = data.filter(n=>n.MaDN.includes(searchDN.value));

 if(searchCD.value)
  data = data.filter(n=>n.MaCD?.includes(searchCD.value));

 render(data);
}

// ===== ADD CHẾ ĐỘ =====
function addCheDo(){
 let ma = newMaCD.value.trim();
 let ten = newTenCD.value.trim();

 if(!ma || !ten){
  alert("❌ Nhập đủ mã và tên chế độ");
  return;
 }

 CheDo.push({
  Ma: ma,
  Ten: ten,
  Tien: 1000000
 });

 loadSelect();
 alert("✅ Đã thêm chế độ");
}

// ===== FILL =====
function fill(ma){
 let nv = NhanVien.find(n=>n.MaNV==ma);
 maNV.value = nv.MaNV;
 tenNV.value = nv.Ten;
 maCV.value = nv.MaCV;
 maDN.value = nv.MaDN;
 thuong.value = nv.Thuong;
 maCD.value = nv.MaCD;
}

// INIT
render(getData());

</script>

</body>
</html>
