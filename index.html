<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Quản lý BHXH</title>
<style>
body { font-family: Arial; margin: 20px; }
input, button { padding: 6px; margin: 5px; }
table { border-collapse: collapse; width: 100%; margin-top: 20px; }
th, td { border: 1px solid #ccc; padding: 8px; }
.error { border: 2px solid red; }
</style>
</head>
<body>

<h2>QUẢN LÝ NHÂN VIÊN BHXH</h2>

<!-- NHÂN VIÊN -->
<input id="maNV" placeholder="Mã NV">
<input id="tenNV" placeholder="Tên NV">
<input id="thuong" type="number" placeholder="Thưởng">

<input id="maCV" placeholder="Mã CV (VD: CV01)">
<input id="maDN" placeholder="Mã DN (VD: DN01)">

<button onclick="addNV()">Thêm NV</button>
<button onclick="updateNV()">Sửa NV</button>

<br><br>

<!-- CHẾ ĐỘ -->
<h3>Thêm chế độ cho nhân viên</h3>
<input id="nvCD" placeholder="Mã NV">
<input id="inputMaCD" placeholder="Nhập mã chế độ (VD: CD01)">
<button onclick="addHuong()">Thêm chế độ</button>

<p>Tên chế độ: <span id="tenCD"></span></p>
<p>Tiền hưởng: <span id="tienCD"></span></p>

<br>

<!-- SEARCH -->
<input id="search" placeholder="Tìm (NV / DN / CD)">
<button onclick="search()">Tìm</button>

<!-- TABLE -->
<table>
<thead>
<tr>
<th>Mã NV</th>
<th>Tên</th>
<th>Mã CV</th>
<th>Lương</th>
<th>Thưởng</th>
<th>Tổng</th>
<th>Mã DN</th>
<th>Mã CD</th>
<th>Chế độ</th>
<th>Tiền</th>
<th>Xóa</th>
</tr>
</thead>
<tbody id="table"></tbody>
</table>

<script>

// ===== DATABASE =====
let ChucVu = [
 {Ma:"CV01", Luong:50000000},
 {Ma:"CV02", Luong:35000000},
 {Ma:"CV03", Luong:20000000},
 {Ma:"CV04", Luong:15000000},
 {Ma:"CV05", Luong:10000000}
];

let CheDo = [
 {Ma:"CD01", Ten:"Ốm đau", Tien:2000000},
 {Ma:"CD02", Ten:"Thai sản", Tien:90000000}
];

let NhanVien = [];
let Huong = [];

// ===== AUTO LOAD CHẾ ĐỘ =====
inputMaCD.oninput = function(){
 let cd = CheDo.find(c=>c.Ma==inputMaCD.value);
 if(cd){
  tenCD.innerText = cd.Ten;
  tienCD.innerText = cd.Tien;
 }else{
  tenCD.innerText = "";
  tienCD.innerText = "";
 }
}

// ===== JOIN =====
function getData(){
 return NhanVien.map(nv=>{
  let cv = ChucVu.find(c=>c.Ma==nv.MaCV);
  let h = Huong.find(x=>x.MaNV==nv.MaNV);
  let cd = CheDo.find(c=>c.Ma==h?.MaCD);

  let tong = (cv?.Luong || 0) + Number(nv.Thuong||0);

  return {
   ...nv,
   Luong: cv?.Luong || 0,
   Tong: tong,
   MaCD: h?.MaCD || "",
   TenCD: cd?.Ten || "",
   Tien: cd?.Tien || ""
  }
 });
}

// ===== RENDER =====
function render(data){
 table.innerHTML = data.map(nv=>`
<tr>
<td>${nv.MaNV}</td>
<td>${nv.Ten}</td>
<td>${nv.MaCV}</td>
<td>${nv.Luong}</td>
<td>${nv.Thuong}</td>
<td>${nv.Tong}</td>
<td>${nv.MaDN}</td>
<td>${nv.MaCD}</td>
<td>${nv.TenCD}</td>
<td>${nv.Tien}</td>
<td><button onclick="del('${nv.MaNV}')">Xóa</button></td>
</tr>
`).join("");
}

// ===== ADD NV =====
function addNV(){
 if(!maNV.value || !tenNV.value){
  return alert("❌ Nhập đủ dữ liệu");
 }

 if(NhanVien.some(n=>n.MaNV==maNV.value)){
  return alert("❌ Trùng mã NV");
 }

 NhanVien.push({
  MaNV: maNV.value,
  Ten: tenNV.value,
  MaCV: maCV.value,
  MaDN: maDN.value,
  Thuong: thuong.value
 });

 render(getData());
}

// ===== ADD CHẾ ĐỘ =====
function addHuong(){
 let maNVInput = nvCD.value.trim();
 let maCDInput = inputMaCD.value.trim();

 // ❌ kiểm tra trống
 if(!maNVInput || !maCDInput){
  return alert("❌ Nhập đủ Mã NV và Mã chế độ");
 }

 // ❌ kiểm tra NV tồn tại
 let nv = NhanVien.find(n => n.MaNV === maNVInput);
 if(!nv){
  return alert("❌ Nhân viên chưa tồn tại! Phải tạo NV trước");
 }

 // ❌ kiểm tra chế độ hợp lệ
 let cd = CheDo.find(c => c.Ma === maCDInput);
 if(!cd){
  return alert("❌ Mã chế độ không tồn tại");
 }

 // ❌ kiểm tra NV đã có chế độ chưa
 let existed = Huong.find(h => h.MaNV === maNVInput);
 if(existed){
  return alert("❌ Nhân viên đã có chế độ rồi!");
 }

 // ✅ thêm
 Huong.push({
  MaNV: maNVInput,
  MaCD: maCDInput
 });

 alert("✅ Thêm chế độ thành công");
 render(getData());
}
// ===== UPDATE =====
function updateNV(){
 let nv = NhanVien.find(n=>n.MaNV==maNV.value);
 if(!nv) return alert("Không tìm thấy");

 nv.Ten = tenNV.value;
 nv.MaCV = maCV.value;
 nv.MaDN = maDN.value;
 nv.Thuong = thuong.value;

 render(getData());
}

// ===== DELETE =====
function del(ma){
 NhanVien = NhanVien.filter(n=>n.MaNV!=ma);
 Huong = Huong.filter(h=>h.MaNV!=ma);
 render(getData());
}

// ===== SEARCH =====
function search(){
 let key = search.value;
 let data = getData().filter(n =>
  n.MaNV.includes(key) ||
  n.MaDN.includes(key) ||
  n.MaCD.includes(key)
 );
 render(data);
}

// INIT
render(getData());

</script>

</body>
</html>
