<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>QL BHXH</title>
<style>
body { font-family: Arial; margin:20px;}
input, button { padding:6px; margin:4px;}
table { border-collapse: collapse; width:100%; margin-top:20px;}
th,td { border:1px solid #ccc; padding:6px;}
</style>
</head>
<body>

<h2>QUẢN LÝ BHXH</h2>

<!-- NHÂN VIÊN -->
<h3>Nhân viên</h3>
<input id="maNV" placeholder="Mã NV">
<input id="tenNV" placeholder="Tên NV">
<input id="maDN" placeholder="Mã DN">
<input id="maCV" placeholder="Mã CV (CV01)">

<br>

<input id="luong" placeholder="Lương" readonly>
<input id="thuong" placeholder="Thưởng" readonly>
<input id="bhxh" placeholder="BHXH" readonly>
<input id="trangThai" placeholder="Trạng thái" readonly>

<br>

<button onclick="addNV()">Thêm NV</button>
<button onclick="updateNV()">Sửa NV</button>

<!-- CHẾ ĐỘ -->
<h3>Hưởng chế độ</h3>
<input id="nvCD" placeholder="Mã NV">
<input id="maCD" placeholder="Mã CD">
<input id="tenCD" placeholder="Tên CD" readonly>
<input id="tienCD" placeholder="Tiền CD" readonly>
<button onclick="addHuong()">Thêm chế độ</button>

<!-- SEARCH -->
<h3>Tìm kiếm</h3>
<input id="search" placeholder="NV / DN / CD">
<button onclick="searchData()">Tìm</button>

<!-- TABLE -->
<table>
<thead>
<tr>
<th>Mã NV</th>
<th>Tên</th>
<th>DN</th>
<th>CV</th>
<th>Lương</th>
<th>Thưởng</th>
<th>BHXH</th>
<th>Trạng thái</th>
<th>Mã CD</th>
<th>Chế độ</th>
<th>Tiền</th>
<th>Xóa</th>
</tr>
</thead>
<tbody id="table"></tbody>
</table>

<script>

// ===== DATABASE =====
let ChucVu = [
 {Ma:"CV01", Luong:50000000, Thuong:10000000, TrangThai:"Đã đóng"},
 {Ma:"CV02", Luong:35000000, Thuong:5000000, TrangThai:"Đã đóng"},
 {Ma:"CV03", Luong:20000000, Thuong:2000000, TrangThai:"Chưa đóng"},
 {Ma:"CV04", Luong:15000000, Thuong:1500000, TrangThai:"Đã đóng"},
 {Ma:"CV05", Luong:10000000, Thuong:1000000, TrangThai:"Chưa đóng"}
];

let CheDo = [
 {Ma:"CD01", Ten:"Ốm đau", Tien:2000000},
 {Ma:"CD02", Ten:"Thai sản", Tien:90000000}
];

let NhanVien = [];
let Huong = [];

// ===== AUTO CHỨC VỤ =====
maCV.addEventListener("input", function(){
 let ma = maCV.value.trim().toUpperCase();
 let cv = ChucVu.find(c => c.Ma === ma);

 if(!cv){
  luong.value="";
  thuong.value="";
  bhxh.value="";
  trangThai.value="❌ Mã CV sai";
  return;
 }

 luong.value = cv.Luong;
 thuong.value = cv.Thuong;

 let tong = cv.Luong + cv.Thuong;
 bhxh.value = Math.min(tong * 0.32, 46800000);

 trangThai.value = cv.TrangThai;
});

// ===== AUTO CHẾ ĐỘ =====
maCD.addEventListener("input", function(){
 let cd = CheDo.find(c => c.Ma === maCD.value.trim());

 if(!cd){
  tenCD.value="❌ Không tồn tại";
  tienCD.value="";
  return;
 }

 tenCD.value = cd.Ten;
 tienCD.value = cd.Tien;
});

// ===== ADD NV =====
function addNV(){
 let ma = maNV.value.trim();
 let ten = tenNV.value.trim();
 let maCvInput = maCV.value.trim().toUpperCase();

 if(!ma || !ten){
  return alert("❌ Thiếu dữ liệu");
 }

 if(NhanVien.some(n=>n.MaNV===ma)){
  return alert("❌ Trùng mã NV");
 }

 let cv = ChucVu.find(c=>c.Ma===maCvInput);
 if(!cv){
  return alert("❌ Mã CV không tồn tại");
 }

 let tong = cv.Luong + cv.Thuong;
 let bhxhValue = Math.min(tong * 0.32, 46800000);

 NhanVien.push({
  MaNV: ma,
  Ten: ten,
  MaDN: maDN.value,
  MaCV: maCvInput,
  Luong: cv.Luong,
  Thuong: cv.Thuong,
  BHXH: bhxhValue,
  TrangThai: cv.TrangThai
 });

 render();
}

// ===== UPDATE =====
function updateNV(){
 let nv = NhanVien.find(n=>n.MaNV===maNV.value.trim());
 if(!nv) return alert("Không tìm thấy");

 nv.Ten = tenNV.value;
 nv.MaDN = maDN.value;

 render();
}

// ===== ADD CHẾ ĐỘ =====
function addHuong(){
 let nv = NhanVien.find(n=>n.MaNV===nvCD.value);
 if(!nv) return alert("❌ NV chưa tồn tại");

 let cd = CheDo.find(c=>c.Ma===maCD.value);
 if(!cd) return alert("❌ CD sai");

 if(Huong.some(h=>h.MaNV===nvCD.value))
  return alert("❌ NV đã có CD");

 Huong.push({ MaNV: nvCD.value, MaCD: maCD.value });

 render();
}

// ===== DELETE =====
function del(ma){
 NhanVien = NhanVien.filter(n=>n.MaNV!==ma);
 Huong = Huong.filter(h=>h.MaNV!==ma);
 render();
}

// ===== JOIN =====
function getData(){
 return NhanVien.map(nv=>{
  let h = Huong.find(x=>x.MaNV===nv.MaNV);
  let cd = CheDo.find(c=>c.Ma===h?.MaCD);

  return {
   ...nv,
   MaCD: h?.MaCD || "",
   TenCD: cd?.Ten || "",
   TienCD: cd?.Tien || ""
  };
 });
}

// ===== RENDER =====
function render(){
 table.innerHTML = getData().map(nv=>`
<tr>
<td>${nv.MaNV}</td>
<td>${nv.Ten}</td>
<td>${nv.MaDN}</td>
<td>${nv.MaCV}</td>
<td>${nv.Luong}</td>
<td>${nv.Thuong}</td>
<td>${nv.BHXH}</td>
<td>${nv.TrangThai}</td>
<td>${nv.MaCD}</td>
<td>${nv.TenCD}</td>
<td>${nv.TienCD}</td>
<td><button onclick="del('${nv.MaNV}')">Xóa</button></td>
</tr>
`).join("");
}

// ===== SEARCH =====
function searchData(){
 let key = search.value.trim();

 let data = getData().filter(n =>
  n.MaNV.includes(key) ||
  n.MaDN.includes(key) ||
  n.MaCD.includes(key)
 );

 table.innerHTML = data.map(nv=>`
<tr>
<td>${nv.MaNV}</td>
<td>${nv.Ten}</td>
<td>${nv.MaDN}</td>
<td>${nv.MaCV}</td>
<td>${nv.Luong}</td>
<td>${nv.Thuong}</td>
<td>${nv.BHXH}</td>
<td>${nv.TrangThai}</td>
<td>${nv.MaCD}</td>
<td>${nv.TenCD}</td>
<td>${nv.TienCD}</td>
<td><button onclick="del('${nv.MaNV}')">Xóa</button></td>
</tr>
`).join("");
}

</script>

</body>
</html>
